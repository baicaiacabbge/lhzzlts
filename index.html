<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"><title>实时聊天室</title><link rel=icon href=https://s3.bmp.ovh/imgs/2025/09/13/b31e39e1af3bb3c7.webp type=image/x-icon><script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script><link rel=stylesheet href=bc.css><script src="supabase.min.js"></script></head><body><div class="app-container" id="app"><div id="loginPanel" class="login-card"><h2>隆职聊天室</h2><div class="ip-badge" id="ipDisplay">🌐 IP检测中...</div><div class="form-group"><label>中文名 (1-6汉字)</label><input type="text" id="username" placeholder="例如：李华" maxlength="6"></div><div class="form-group"><label>密码 (8-12位，包含数字、字母、特殊字符)</label><input type="password" id="password" placeholder="********" maxlength="12"></div><div id="loginError" class="error"></div><button class="btn" id="enterBtn" disabled>进入聊天室</button><div style="margin-top: 20px; text-align: center; color: #475569; font-size:0.9rem;">已有账号直接登录，新账号自动注册</div></div><div id="chatPanel" style="display: none; width: 100%;"><div style="display: flex; flex-wrap: wrap; gap: 20px; width: 100%;"><div class="chat-main"><div class="chat-header"><span class="user-badge" id="userInfo">加载中...</span><span class="reset-timer" id="timeReminder"></span></div><div id="warningMessage" class="warning"></div><div class="messages" id="messageList"></div><div class="input-area"><input type="text" id="messageInput" placeholder="说点什么... (最多200字)" maxlength="200"><button class="btn" id="sendBtn">发送</button></div><div class="char-count" id="charCount">0/200</div></div><div class="online-sidebar"><div class="online-title"><span>👥 在线列表</span><span style="font-size: 0.9rem; background: rgba(255,255,255,0.5); padding: 4px 12px; border-radius:40px;" id="onlineCount">0 在线</span></div><ul class="online-list" id="onlineList"><li style="color: #94a3b8; text-align: center; padding: 20px;">加载中...</li></ul></div></div><div class="footer-bar"><span></span><span class="school-info" unselectable="on">聊天室</span><div style="display: flex; gap: 12px;"><span class="bulletin-btn" id="viewBulletinBtn">📢 查看公告</span></div></div></div></div><div class="modal" id="bulletinModal"><div class="modal-content"><h3>📋 聊天室公告</h3><p id="bulletinContent">加载中...</p><div class="close-modal"><button id="closeModalBtn">关闭</button></div></div></div><script src=bc.js></script></body></html>
