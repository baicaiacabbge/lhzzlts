<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>实时聊天室 · 隆华职中 · 在线状态</title>
    <!-- 引入 bcryptjs 用于密码哈希 -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <style>
        /* 全局样式 - 现代毛玻璃效果 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 登录卡片 */
        .login-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px 32px;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .login-card h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 32px;
            letter-spacing: -0.02em;
        }

        .ip-badge {
            background: rgba(37, 99, 235, 0.1);
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 0.95rem;
            color: #1e293b;
            margin-bottom: 28px;
            border: 1px solid rgba(37,99,235,0.2);
            backdrop-filter: blur(4px);
        }

        .form-group {
            margin-bottom: 28px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0f172a;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px 22px;
            border: 2px solid rgba(203, 213, 225, 0.6);
            border-radius: 60px;
            font-size: 1rem;
            background: rgba(255,255,255,0.8);
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
            background: white;
        }

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 8px 20px -8px #2563eb;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -8px #1d4ed8;
        }

        .btn:disabled {
            background: #94a3b8;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
        }

        .error {
            color: #dc2626;
            font-size: 0.9rem;
            margin-top: 8px;
            padding-left: 16px;
            display: none;
        }

        /* 聊天主区域 (两列布局) */
        .chat-main {
            flex: 3;
            min-width: 300px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .online-sidebar {
            flex: 1;
            min-width: 260px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 24px 20px;
            height: fit-content;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.5);
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .online-sidebar { width: 100%; max-height: 300px; }
        }

        /* 聊天头部 */
        .chat-header {
            padding: 24px 28px;
            border-bottom: 1px solid rgba(203, 213, 225, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .user-badge {
            background: rgba(37, 99, 235, 0.15);
            color: #1e40af;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .reset-timer {
            font-size: 0.9rem;
            color: #475569;
            background: rgba(255,255,255,0.5);
            padding: 6px 16px;
            border-radius: 40px;
        }

        /* 消息列表 */
        .messages {
            padding: 24px 28px;
            height: 400px;
            overflow-y: auto;
            background: rgba(248, 250, 252, 0.6);
            border-radius: 32px;
            margin: 20px 28px;
            border: 1px solid rgba(203, 213, 225, 0.4);
        }

        .message {
            margin-bottom: 24px;
            border-bottom: 1px dashed rgba(148, 163, 184, 0.3);
            padding-bottom: 16px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        .message-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .message-author {
            font-weight: 700;
            color: #2563eb;
            background: rgba(37,99,235,0.05);
            padding: 2px 12px;
            border-radius: 40px;
        }

        .message-time {
            color: #94a3b8;
        }

        .message-content {
            word-break: break-word;
            color: #0f172a;
            padding-right: 40px;
            line-height: 1.5;
        }

        .delete-btn {
            position: absolute;
            right: 0;
            top: 4px;
            background: rgba(239, 68, 68, 0.1);
            border: none;
            color: #ef4444;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 40px;
            display: none;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .message:hover .delete-btn {
            display: block;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #b91c1c;
        }

        /* 输入区 */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 0 28px 24px 28px;
        }

        .input-area input {
            flex: 1;
            padding: 16px 24px;
            border: 2px solid rgba(203, 213, 225, 0.6);
            border-radius: 60px;
            font-size: 1rem;
            background: rgba(255,255,255,0.8);
        }

        .input-area button {
            width: auto;
            padding: 16px 36px;
        }

        .char-count {
            padding: 0 28px 20px 28px;
            font-size: 0.9rem;
            color: #64748b;
            text-align: right;
        }

        /* 在线侧边栏 */
        .online-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .online-list {
            list-style: none;
        }

        .online-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 14px;
            transition: all 0.2s;
        }

        .online .status-dot {
            background: #22c55e;
            box-shadow: 0 0 0 3px #bbf7d0;
        }

        .offline .status-dot {
            background: #94a3b8;
        }

        .username {
            flex: 1;
            font-weight: 600;
            color: #334155;
        }

        .user-ip {
            font-size: 0.8rem;
            color: #94a3b8;
            background: rgba(148,163,184,0.1);
            padding: 2px 8px;
            border-radius: 40px;
        }

        /* 警告条 */
        .warning {
            background: rgba(254, 215, 170, 0.8);
            backdrop-filter: blur(8px);
            color: #9a3412;
            padding: 14px 24px;
            margin: 0 28px 20px 28px;
            border-radius: 60px;
            font-size: 0.95rem;
            display: none;
            border: 1px solid #fed7aa;
        }

        /* 底部信息栏 */
        .footer-bar {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            margin-top: 10px;
            user-select: none; /* 不可选中 */
        }

        .school-info {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            text-align: center;
            flex: 1;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bulletin-btn {
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid rgba(37,99,235,0.3);
            color: #2563eb;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            backdrop-filter: blur(4px);
        }

        .bulletin-btn:hover {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .admin-link {
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.5);
            transition: all 0.2s;
        }

        .admin-link:hover {
            background: white;
            color: #2563eb;
        }

        /* 公告弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 32px 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            border: 1px solid white;
        }

        .modal-content h3 {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #334155;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 60vh;
            overflow-y: auto;
        }

        .close-modal {
            margin-top: 24px;
            text-align: right;
        }

        .close-modal button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
    <!-- 加载 Supabase JS -->
    <script src="supabase.min.js"></script>
</head>
<body>
    <div class="app-container" id="app">
        <!-- 登录卡片 (默认显示) -->
        <div id="loginPanel" class="login-card">
            <h2>隆职聊天室</h2>
            <div class="ip-badge" id="ipDisplay">🌐 IP检测中...</div>
            <div class="form-group">
                <label>中文名 (1-6汉字)</label>
                <input type="text" id="username" placeholder="例如：李华" maxlength="6">
            </div>
            <div class="form-group">
                <label>密码 (8-12位，包含数字、字母、特殊字符)</label>
                <input type="password" id="password" placeholder="********" maxlength="12">
            </div>
            <div id="loginError" class="error"></div>
            <button class="btn" id="enterBtn" disabled>进入聊天室</button>
            <div style="margin-top: 20px; text-align: center; color: #475569; font-size:0.9rem;">已有账号直接登录，新账号自动注册</div>
        </div>

        <!-- 聊天主面板 (登录后显示) -->
        <div id="chatPanel" style="display: none; width: 100%;">
            <div style="display: flex; flex-wrap: wrap; gap: 20px; width: 100%;">
                <!-- 左侧聊天区 -->
                <div class="chat-main">
                    <div class="chat-header">
                        <span class="user-badge" id="userInfo">加载中...</span>
                        <span class="reset-timer" id="timeReminder"></span>
                    </div>
                    <div id="warningMessage" class="warning"></div>
                    <div class="messages" id="messageList"></div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="说点什么... (最多200字)" maxlength="200">
                        <button class="btn" id="sendBtn">发送</button>
                    </div>
                    <div class="char-count" id="charCount">0/200</div>
                </div>

                <!-- 右侧在线状态栏 -->
                <div class="online-sidebar">
                    <div class="online-title">
                        <span>👥 在线列表</span>
                        <span style="font-size: 0.9rem; background: rgba(255,255,255,0.5); padding: 4px 12px; border-radius:40px;" id="onlineCount">0 在线</span>
                    </div>
                    <ul class="online-list" id="onlineList">
                        <li style="color: #94a3b8; text-align: center; padding: 20px;">加载中...</li>
                    </ul>
                </div>
            </div>

            <!-- 底部信息栏 (班级信息 + 公告按钮) -->
            <div class="footer-bar">
                <span></span> <!-- 占位 -->
                <span class="school-info" unselectable="on">聊天室</span>
                <div style="display: flex; gap: 12px;">
                    <span class="bulletin-btn" id="viewBulletinBtn">📢 查看公告</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 公告弹窗 -->
    <div class="modal" id="bulletinModal">
        <div class="modal-content">
            <h3>📋 聊天室公告</h3>
            <p id="bulletinContent">加载中...</p>
            <div class="close-modal">
                <button id="closeModalBtn">关闭</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== 配置 ==========
            const SUPABASE_URL = 'https://dthbezrtrvobulfxcprs.supabase.co';   // 替换
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0aGJlenJ0cnZvYnVsZnhjcHJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzODkwNjYsImV4cCI6MjA4ODk2NTA2Nn0.JxmdxhVm7948T2NhNha8au4CNcGVMuw9N78jUNXrs_c';             // 替换
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const bcrypt = dcodeIO.bcrypt; // 从全局获取 bcrypt

            // 状态变量
            let currentUser = null;
            let messagesSubscription = null;
            let heartbeatsSubscription = null;
            let bulletinSubscription = null;   // 订阅公告变化
            let dailyResetTimer = null;
            let heartbeatInterval = null;
            let pingInterval = null;
            let onlineUsers = [];

            // DOM 元素
            const loginPanel = document.getElementById('loginPanel');
            const chatPanel = document.getElementById('chatPanel');
            const ipSpan = document.getElementById('ipDisplay');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const enterBtn = document.getElementById('enterBtn');
            const loginError = document.getElementById('loginError');
            const userInfoDiv = document.getElementById('userInfo');
            const messageList = document.getElementById('messageList');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const charCount = document.getElementById('charCount');
            const warningDiv = document.getElementById('warningMessage');
            const timeReminder = document.getElementById('timeReminder');
            const onlineList = document.getElementById('onlineList');
            const onlineCountSpan = document.getElementById('onlineCount');
            const viewBulletinBtn = document.getElementById('viewBulletinBtn');
            const bulletinModal = document.getElementById('bulletinModal');
            const bulletinContent = document.getElementById('bulletinContent');
            const closeModalBtn = document.getElementById('closeModalBtn');

            // ========== IP 检测 ==========
            async function detectIP() {
                const apis = [
                    'https://api.ipify.org?format=json',
                    'https://api.my-ip.io/ip.json',
                    'https://ipapi.co/json/'
                ];
                for (let api of apis) {
                    try {
                        const res = await fetch(api, { mode: 'cors' });
                        const data = await res.json();
                        const ip = data.ip || data.address || data.query;
                        if (ip) return ip;
                    } catch (e) { /* 忽略 */ }
                }
                // 降级：WebRTC
                return new Promise((resolve) => {
                    try {
                        const pc = new RTCPeerConnection({ iceServers: [] });
                        pc.createDataChannel('');
                        pc.createOffer().then(offer => pc.setLocalDescription(offer));
                        pc.onicecandidate = (e) => {
                            if (!e.candidate) return;
                            const match = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
                            if (match) { resolve(match[1]); pc.close(); }
                        };
                        setTimeout(() => resolve('0.0.0.0'), 3000);
                    } catch { resolve('0.0.0.0'); }
                });
            }

            let detectedIP = '检测中...';
            detectIP().then(ip => {
                detectedIP = ip;
                ipSpan.innerHTML = `🌐 你的IP：<span style="color:#2563eb;">${ip}</span>`;
                enterBtn.disabled = false;
            }).catch(() => {
                detectedIP = '未知';
                ipSpan.innerHTML = '🌐 无法检测IP，将使用 0.0.0.0';
                enterBtn.disabled = false;
            });

            // ========== 密码复杂度验证 ==========
            function validatePassword(pwd) {
                if (pwd.length < 8 || pwd.length > 12) return false;
                const hasDigit = /\d/.test(pwd);
                const hasLetter = /[a-zA-Z]/.test(pwd);
                const hasSpecial = /[^a-zA-Z0-9]/.test(pwd);
                return hasDigit && hasLetter && hasSpecial;
            }

            // ========== 登录/注册处理 ==========
            enterBtn.addEventListener('click', async () => {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                // 基本验证
                if (!/^[\u4e00-\u9fa5]{1,6}$/.test(username) || username === 'null') {
                    loginError.textContent = '名字必须是1-6位汉字，且不能为"null"';
                    loginError.style.display = 'block';
                    return;
                }
                if (!validatePassword(password)) {
                    loginError.textContent = '密码需8-12位，包含数字、字母、特殊字符';
                    loginError.style.display = 'block';
                    return;
                }

                enterBtn.disabled = true;
                loginError.style.color = '#2563eb';
                loginError.textContent = '处理中...';
                loginError.style.display = 'block';

                try {
                    if (detectedIP === '检测中...') await new Promise(r => setTimeout(r, 500));
                    const currentIP = detectedIP === '检测中...' ? '0.0.0.0' : detectedIP;

                    // 检查IP是否被封禁
                    const { data: banned, error: banErr } = await supabase
                        .from('banned_ips')
                        .select('ip')
                        .eq('ip', currentIP)
                        .maybeSingle();
                    if (banErr) throw banErr;
                    if (banned) throw new Error('您的IP已被封禁，无法登录');

                    // 查询用户是否存在
                    const { data: existingUser, error: userErr } = await supabase
                        .from('users')
                        .select('*')
                        .eq('username', username)
                        .maybeSingle();

                    if (userErr) throw userErr;

                    if (existingUser) {
                        // 登录：验证密码
                        const match = await bcrypt.compare(password, existingUser.password_hash);
                        if (!match) throw new Error('密码错误');

                        // 更新最后登录时间和IP
                        const { error: updateErr } = await supabase
                            .from('users')
                            .update({ last_login: new Date().toISOString(), ip: currentIP })
                            .eq('id', existingUser.id);
                        if (updateErr) throw updateErr;

                        currentUser = { ...existingUser, ip: currentIP };
                    } else {
                        // 注册：生成哈希，插入用户
                        const saltRounds = 10;
                        const hash = await bcrypt.hash(password, saltRounds);

                        const { data: newUser, error: insertErr } = await supabase
                            .from('users')
                            .insert({ username, password_hash: hash, ip: currentIP })
                            .select()
                            .single();

                        if (insertErr) {
                            if (insertErr.message.includes('IP is banned')) throw new Error('IP被封禁');
                            throw insertErr;
                        }
                        currentUser = newUser;
                    }

                    // 登录成功
                    loginPanel.style.display = 'none';
                    chatPanel.style.display = 'block';
                    userInfoDiv.textContent = `👤 ${currentUser.username} (${currentUser.ip})`;

                    // 启动心跳、加载数据、订阅
                    startHeartbeat();
                    loadMessages();
                    loadOnlineUsers();
                    subscribeMessages();
                    subscribeHeartbeats();
                    subscribeBulletin();   // 订阅公告
                    startDailyResetTimer();
                    startPing();

                } catch (err) {
                    loginError.textContent = err.message;
                    loginError.style.color = '#dc2626';
                } finally {
                    enterBtn.disabled = false;
                }
            });

            // ========== 心跳 ==========
            function startHeartbeat() {
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                const sendHeartbeat = async () => {
                    if (!currentUser) return;
                    await supabase
                        .from('heartbeats')
                        .upsert({ user_id: currentUser.id, last_seen: new Date().toISOString() });
                };
                sendHeartbeat();
                heartbeatInterval = setInterval(sendHeartbeat, 5000);
            }

            // ========== 在线列表 ==========
            async function loadOnlineUsers() {
                const { data, error } = await supabase
                    .from('user_online_status')
                    .select('*');
                if (error) { console.error(error); return; }
                onlineUsers = data || [];
                renderOnlineList();
            }

            function subscribeHeartbeats() {
                if (heartbeatsSubscription) heartbeatsSubscription.unsubscribe();
                heartbeatsSubscription = supabase
                    .channel('heartbeats-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'heartbeats' }, () => {
                        loadOnlineUsers();
                    })
                    .subscribe();
            }

            function renderOnlineList() {
                if (!onlineUsers.length) {
                    onlineList.innerHTML = '<li style="color:#94a3b8; text-align:center;">暂无用户</li>';
                    onlineCountSpan.textContent = '0 在线';
                    return;
                }
                const sorted = [...onlineUsers].sort((a, b) => (b.online ? 1 : 0) - (a.online ? 1 : 0));
                const onlineCount = sorted.filter(u => u.online).length;
                onlineCountSpan.textContent = `${onlineCount} 在线`;

                const html = sorted.map(u => `
                    <li class="online-item ${u.online ? 'online' : 'offline'}">
                        <span class="status-dot"></span>
                        <span class="username">${escapeHtml(u.username)}</span>
                        <span class="user-ip">${u.ip}</span>
                    </li>
                `).join('');
                onlineList.innerHTML = html;
            }

            // ========== 消息功能 ==========
            async function loadMessages() {
                const { data, error } = await supabase
                    .from('messages')
                    .select(`
                        id,
                        content,
                        created_at,
                        user:users ( id, username )
                    `)
                    .order('created_at', { ascending: true });
                if (error) { console.error(error); return; }
                renderMessages(data || []);
            }

            function renderMessages(messages) {
                if (!messages.length) {
                    messageList.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:40px;">暂无消息</div>';
                    return;
                }
                const html = messages.map(msg => {
                    const time = new Date(msg.created_at).toLocaleString('zh-CN', { hour12: false });
                    const isMine = currentUser && msg.user?.id === currentUser.id;
                    return `
                        <div class="message" data-id="${msg.id}">
                            <div class="message-header">
                                <span class="message-author">${escapeHtml(msg.user?.username || '未知')}</span>
                                <span class="message-time">${time}</span>
                            </div>
                            <div class="message-content">${escapeHtml(msg.content)}</div>
                            ${isMine ? '<button class="delete-btn" onclick="deleteMessage(\'' + msg.id + '\')">🗑️</button>' : ''}
                        </div>
                    `;
                }).join('');
                messageList.innerHTML = html;
                messageList.scrollTop = messageList.scrollHeight;
            }

            window.deleteMessage = async function(messageId) {
                if (!currentUser) return;
                try {
                    const { error } = await supabase
                        .from('messages')
                        .delete()
                        .eq('id', messageId)
                        .eq('user_id', currentUser.id);
                    if (error) showWarning('删除失败：' + error.message);
                } catch (err) {
                    showWarning('删除异常');
                }
            };

            function subscribeMessages() {
                if (messagesSubscription) messagesSubscription.unsubscribe();
                messagesSubscription = supabase
                    .channel('messages-changes')
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadMessages())
                    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => loadMessages())
                    .subscribe();
            }

            // 发送消息
            sendBtn.addEventListener('click', sendMessage);
            messageInput.addEventListener('input', () => {
                charCount.textContent = `${messageInput.value.length}/200`;
            });
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            async function sendMessage() {
                if (!currentUser) return;
                const content = messageInput.value.trim();
                if (!content || content.length > 200) return;
                sendBtn.disabled = true;
                const original = content;
                messageInput.value = '';
                charCount.textContent = '0/200';

                try {
                    const { error } = await supabase
                        .from('messages')
                        .insert({ user_id: currentUser.id, content: original });
                    if (error) {
                        if (error.message.includes('IP is banned')) {
                            showWarning('您的IP已被封禁，消息未发送');
                        } else {
                            showWarning('发送失败');
                        }
                        messageInput.value = original;
                    }
                } catch (err) {
                    showWarning('发送异常');
                    messageInput.value = original;
                } finally {
                    sendBtn.disabled = false;
                }
            }

            function showWarning(text) {
                warningDiv.textContent = text;
                warningDiv.style.display = 'block';
                setTimeout(() => { warningDiv.style.display = 'none'; }, 4000);
            }

            // ========== 公告功能 ==========
            async function loadBulletin() {
                const { data, error } = await supabase
                    .from('bulletin')
                    .select('content')
                    .eq('id', 1)
                    .single();
                if (error) console.error(error);
                else bulletinContent.textContent = data.content;
            }

            function subscribeBulletin() {
                if (bulletinSubscription) bulletinSubscription.unsubscribe();
                bulletinSubscription = supabase
                    .channel('bulletin-changes')
                    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bulletin' }, payload => {
                        bulletinContent.textContent = payload.new.content;
                    })
                    .subscribe();
                loadBulletin(); // 初始加载
            }

            // 打开关闭弹窗
            viewBulletinBtn.addEventListener('click', () => {
                bulletinModal.classList.add('active');
                loadBulletin(); // 刷新内容
            });
            closeModalBtn.addEventListener('click', () => {
                bulletinModal.classList.remove('active');
            });
            window.addEventListener('click', (e) => {
                if (e.target === bulletinModal) bulletinModal.classList.remove('active');
            });

            // ========== 每日0点提示 ==========
            function startDailyResetTimer() {
                if (dailyResetTimer) clearInterval(dailyResetTimer);
                const updateReminder = () => {
                    const now = new Date();
                    const next = new Date(now);
                    next.setHours(24, 0, 0, 0);
                    const diff = next - now;
                    const hours = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    timeReminder.textContent = `每日0点清空 · ${hours}时${mins}分后`;
                };
                updateReminder();
                dailyResetTimer = setInterval(updateReminder, 60000);
            }

            // ========== 定时 ping ==========
            function startPing() {
                if (pingInterval) clearInterval(pingInterval);
                pingInterval = setInterval(async () => {
                    await supabase.from('users').select('count', { count: 'exact', head: true });
                }, 300000);
            }

            // ========== 工具 ==========
            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, m => {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // 清理
            window.addEventListener('beforeunload', () => {
                if (messagesSubscription) messagesSubscription.unsubscribe();
                if (heartbeatsSubscription) heartbeatsSubscription.unsubscribe();
                if (bulletinSubscription) bulletinSubscription.unsubscribe();
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                if (dailyResetTimer) clearInterval(dailyResetTimer);
                if (pingInterval) clearInterval(pingInterval);
            });
        })();
    </script>
</body>
</html>
